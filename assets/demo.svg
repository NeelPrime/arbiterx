<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <!-- Window frame -->
  <rect width="800" height="520" rx="8" fill="#1e1e2e"/>
  <!-- Title bar -->
  <rect width="800" height="32" rx="8" fill="#313244"/>
  <rect y="24" width="800" height="8" fill="#313244"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="16" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="16" r="6" fill="#fab387"/>
  <circle cx="60" cy="16" r="6" fill="#a6e3a1"/>
  <!-- Title -->
  <text x="400" y="20" font-family="SF Mono, Menlo, monospace" font-size="12" fill="#cdd6f4" text-anchor="middle">ArbiterX — Terminal Demo</text>
  
  <!-- Terminal content -->
  <g font-family="SF Mono, Menlo, Monaco, monospace" font-size="13" fill="#cdd6f4">
    <!-- Line 1: Command -->
    <text x="16" y="56"><tspan fill="#89b4fa">$</tspan> arbiterx map</text>
    <!-- Map output -->
    <text x="16" y="80" fill="#6c7086">┌──────────────────┬─────────┐</text>
    <text x="16" y="98" fill="#6c7086">│</text><text x="32" y="98" fill="#89dceb"> Files indexed</text><text x="192" y="98" fill="#6c7086">│</text><text x="208" y="98" fill="#a6e3a1"> 46</text><text x="288" y="98" fill="#6c7086">│</text>
    <text x="16" y="116" fill="#6c7086">│</text><text x="32" y="116" fill="#89dceb"> Symbols extracted</text><text x="192" y="116" fill="#6c7086">│</text><text x="208" y="116" fill="#a6e3a1"> 1,364</text><text x="288" y="116" fill="#6c7086">│</text>
    <text x="16" y="134" fill="#6c7086">│</text><text x="32" y="134" fill="#89dceb"> Time</text><text x="192" y="134" fill="#6c7086">│</text><text x="208" y="134" fill="#a6e3a1"> 0.25s</text><text x="288" y="134" fill="#6c7086">│</text>
    <text x="16" y="152" fill="#6c7086">└──────────────────┴─────────┘</text>
    
    <!-- Line 2: Route -->
    <text x="16" y="184"><tspan fill="#89b4fa">$</tspan> arbiterx route "fix the auth bypass bug"</text>
    <text x="16" y="208" fill="#6c7086">│</text><text x="32" y="208" fill="#89dceb"> Type</text><text x="160" y="208" fill="#f9e2af">DEBUGGING</text></text>
    <text x="16" y="226" fill="#6c7086">│</text><text x="32" y="226" fill="#89dceb"> Complexity</text><text x="160" y="226" fill="#fab387">HIGH</text></text>
    <text x="16" y="244" fill="#6c7086">│</text><text x="32" y="244" fill="#89dceb"> → Model</text><text x="160" y="244" fill="#a6e3a1">opus (deep security reasoning)</text></text>
    
    <!-- Line 3: Query -->
    <text x="16" y="280"><tspan fill="#89b4fa">$</tspan> arbiterx query QualityGate</text>
    <text x="16" y="304" fill="#6c7086">│</text><text x="32" y="304" fill="#cba6f7"> QualityGate</text><text x="160" y="304" fill="#6c7086">class</text><text x="210" y="304" fill="#89dceb">src/arbiterx/gate/validator.py:42</text>
    
    <!-- Line 4: Gate -->
    <text x="16" y="340"><tspan fill="#89b4fa">$</tspan> arbiterx gate check bad_code.py</text>
    <text x="16" y="364" fill="#f38ba8">  ❌ Score: 35/100  FAILED</text>
    <text x="16" y="384" fill="#f38ba8">  • [high] Hardcoded password detected</text>
    <text x="16" y="402" fill="#fab387">  • [medium] File operation without error handling</text>
    <text x="16" y="420" fill="#fab387">  • [medium] String concatenation in loop</text>
    
    <!-- Line 5: Good code -->
    <text x="16" y="452"><tspan fill="#89b4fa">$</tspan> arbiterx gate check good_code.py</text>
    <text x="16" y="476" fill="#a6e3a1">  ✅ Score: 100/100  PASSED</text>
    
    <!-- Bottom -->
    <text x="16" y="506" fill="#6c7086">  pip install arbiterx  •  github.com/neelpatel/arbiterx</text>
  </g>
</svg>
