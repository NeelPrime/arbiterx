<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <rect width="800" height="520" rx="8" fill="#1e1e2e"/>
  <rect width="800" height="32" rx="8" fill="#313244"/>
  <rect y="24" width="800" height="8" fill="#313244"/>
  <circle cx="20" cy="16" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="16" r="6" fill="#fab387"/>
  <circle cx="60" cy="16" r="6" fill="#a6e3a1"/>
  <text x="400" y="20" font-family="monospace" font-size="12" fill="#cdd6f4" text-anchor="middle">ArbiterX — Terminal Demo</text>

  <text x="16" y="56" font-family="monospace" font-size="13" fill="#89b4fa">$ <tspan fill="#cdd6f4">arbiterx map</tspan></text>
  <text x="16" y="80" font-family="monospace" font-size="13" fill="#6c7086">┌──────────────────┬─────────┐</text>
  <text x="16" y="98" font-family="monospace" font-size="13" fill="#6c7086">│ <tspan fill="#89dceb">Files indexed</tspan>     │ <tspan fill="#a6e3a1">46</tspan>      │</text>
  <text x="16" y="116" font-family="monospace" font-size="13" fill="#6c7086">│ <tspan fill="#89dceb">Symbols extracted</tspan> │ <tspan fill="#a6e3a1">1,364</tspan>   │</text>
  <text x="16" y="134" font-family="monospace" font-size="13" fill="#6c7086">│ <tspan fill="#89dceb">Time</tspan>             │ <tspan fill="#a6e3a1">0.25s</tspan>   │</text>
  <text x="16" y="152" font-family="monospace" font-size="13" fill="#6c7086">└──────────────────┴─────────┘</text>

  <text x="16" y="184" font-family="monospace" font-size="13" fill="#89b4fa">$ <tspan fill="#cdd6f4">arbiterx route "fix the auth bypass bug"</tspan></text>
  <text x="16" y="208" font-family="monospace" font-size="13" fill="#6c7086">  Type        <tspan fill="#f9e2af">DEBUGGING</tspan></text>
  <text x="16" y="226" font-family="monospace" font-size="13" fill="#6c7086">  Complexity  <tspan fill="#fab387">HIGH</tspan></text>
  <text x="16" y="244" font-family="monospace" font-size="13" fill="#6c7086">  → Model     <tspan fill="#a6e3a1">opus (deep security reasoning)</tspan></text>

  <text x="16" y="280" font-family="monospace" font-size="13" fill="#89b4fa">$ <tspan fill="#cdd6f4">arbiterx query QualityGate</tspan></text>
  <text x="16" y="304" font-family="monospace" font-size="13" fill="#6c7086">  <tspan fill="#cba6f7">QualityGate</tspan>  class  <tspan fill="#89dceb">src/arbiterx/gate/validator.py:42</tspan></text>

  <text x="16" y="340" font-family="monospace" font-size="13" fill="#89b4fa">$ <tspan fill="#cdd6f4">arbiterx gate --file bad_code.py</tspan></text>
  <text x="16" y="364" font-family="monospace" font-size="13" fill="#f38ba8">  ❌ Score: 35/100  FAILED</text>
  <text x="16" y="384" font-family="monospace" font-size="13" fill="#f38ba8">  • [high] Hardcoded password detected</text>
  <text x="16" y="402" font-family="monospace" font-size="13" fill="#fab387">  • [medium] File operation without error handling</text>
  <text x="16" y="420" font-family="monospace" font-size="13" fill="#fab387">  • [medium] String concatenation in loop</text>

  <text x="16" y="452" font-family="monospace" font-size="13" fill="#89b4fa">$ <tspan fill="#cdd6f4">arbiterx gate --file good_code.py</tspan></text>
  <text x="16" y="476" font-family="monospace" font-size="13" fill="#a6e3a1">  ✅ Score: 100/100  PASSED</text>

  <text x="16" y="506" font-family="monospace" font-size="12" fill="#6c7086">  pip install arbiterx  •  github.com/NeelPrime/arbiterx</text>
</svg>
