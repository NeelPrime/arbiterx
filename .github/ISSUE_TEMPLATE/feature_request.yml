name: Feature Request
description: Suggest a new feature for ArbiterX
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - "critical — Blocking my workflow"
        - "high — Would significantly improve my experience"
        - "medium — Nice to have"
        - "low — Minor improvement"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like?
      placeholder: Describe the feature clearly
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Why do you need this? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds?
    validations:
      required: false
